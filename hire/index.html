<!DOCTYPE html>
<html lang="en">

<head>
    <meta property="og:title" content="Corgi Taco's Resume">
    <meta property="og:description" content="View Corgi Taco's Education and Experience.">
    <meta property="og:url" content="https://corgitaco.dev/resume">

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume — Corgi Taco</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/hire_me_style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
    <script src="../assets/js/script.js"></script>
</head>

<body id="vanta-bg">

<div id="main">
    <script src="../assets/js/pagechange.js"></script>

    <div id="sticky-header">
        <div id="titlebar">
            <div id="win-controls">
                <span class="win-btn win-close" title="Close"></span>
                <span class="win-btn win-minimize" title="Minimize"></span>
                <span class="win-btn win-maximize" title="Maximize"></span>
            </div>
            <span id="win-title"></span>
            <script>document.getElementById("win-title").textContent = location.host + "/resume — zsh";</script>
        </div>

        <div class="header">
            <nav role='navigation'>
                <ul id='nav-main'>
                    <li><a class="nav-link" id="meow" href="../"><i class="fa fa-home"></i>Home</a></li>
                    <li><a class="nav-link" href="../projects"><i class="fa fa-code"></i>Projects</a></li>
                    <li id="nav-tab-active"><a class="nav-link" href="../hire"><i class="fa fa-file-text"></i>Hire</a></li>
                    <li><a class="nav-link" href="../blog"><i class="fa fa-pencil"></i>Blog</a></li>
                    <li><a class="nav-link" href="../about"><i class="fa fa-user"></i>About</a></li>
                    <li><a class="nav-link" href="../donate"><i class="fa fa-heart"></i>Donate</a></li>
                    <li class="more hidden" data-width="80">
                        <a href="#">☰</a>
                        <ul></ul>
                    </li>
                </ul>
            </nav>
        </div>

        <div id="projects-title-bar">
            <h1>Hire Me</h1>
            <button class="resume-download-btn" id="open-pdf-btn">
                <i class="fa fa-file-pdf-o"></i> View PDF
            </button>
        </div>
    </div>

    <div class="resume-scroll-container">

        <!-- Top info bar: contact + highlights -->
        <div class="resume-top-bar">
            <div class="resume-contact-card" id="resume-contact-card">
                <!-- Populated by resume_filler.js -->
            </div>
            <div class="resume-highlights-card" id="resume-highlights-card">
                <!-- Populated by resume_filler.js -->
            </div>
        </div>

        <!-- Timeline columns: Experience first, then Education -->
        <div class="resume-wrapper">

            <div class="resume-column">
                <div class="timeline-scroll">
                    <div class="resume-header">
                        <i class="fa fa-briefcase"></i> Experience
                    </div>
                    <div class="timeline" id="experience-timeline"></div>
                </div>
            </div>

            <div class="resume-column">
                <div class="timeline-scroll">
                    <div class="resume-header">
                        <i class="fa fa-book"></i> Education
                    </div>
                    <div class="timeline" id="education-timeline"></div>
                </div>
            </div>

        </div>

        <!-- Testimonials carousel -->
        <div class="testimonials-section">
            <div class="testimonials-track-wrap">
                <div class="testimonials-header">
                    <i class="fa fa-comments"></i> Testimonials
                </div>
                <div class="testimonials-track" id="testimonials-track"></div>
            </div>
        </div>

    </div>

    <!-- Timeline item detail modal -->
    <div id="timeline-modal-overlay">
        <div class="tm-modal" id="tm-modal">
            <div class="tm-titlebar">
                <div class="tm-win-controls">
                    <span class="tm-win-btn tm-win-close" id="tm-close-x"></span>
                    <span class="tm-win-btn tm-win-min"></span>
                    <span class="tm-win-btn tm-win-max"></span>
                </div>
                <span class="tm-win-title" id="tm-win-title">detail — zsh</span>
            </div>
            <div class="tm-body" id="tm-body"></div>
            <button class="tm-close-btn" id="tm-close-btn">
                <i class="fa fa-arrow-left"></i> Close
            </button>
        </div>
    </div>

    <!-- PDF viewer modal -->
    <div id="pdf-modal-overlay">
        <div class="pdf-modal">
            <div class="pdf-modal-titlebar">
                <div class="tm-win-controls">
                    <span class="tm-win-btn tm-win-close" id="pdf-close-x"></span>
                    <span class="tm-win-btn tm-win-min"></span>
                    <span class="tm-win-btn tm-win-max"></span>
                </div>
                <span class="tm-win-title">resume.pdf — zsh</span>
                <a href="../assets/hire/resume.pdf" download class="pdf-modal-dl-btn" title="Download">
                    <i class="fa fa-download"></i>
                </a>
            </div>
            <iframe id="pdf-iframe" class="pdf-iframe" src="" title="Resume PDF"></iframe>
        </div>
    </div>

    <script src="../assets/js/resume_filler.js"></script>

</div>

</body>
</html>
