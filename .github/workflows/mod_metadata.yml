name: Update Mod Metadata

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch mod metadata and history
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_PROJECTS: ${{ vars.CURSEFORGE_PROJECTS }}
          MODRINTH_PROJECTS: ${{ vars.MODRINTH_PROJECTS }}
          OUTPUT_JSON: data/mods.json
          HISTORY_DIR: data/history/mods
        run: python gh_scripts/fetch_mod_metadata.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mods.json data/history/mods/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update mod metadata [skip ci]"
            git pull --rebase origin main
            git push
          fi