name: Update YouTube Playlist Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needed: ${{ steps.check.outputs.needed }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ ! -f "data/history/youtube/totals.csv" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

  update-stats:
    needs: check
    if: needs.check.outputs.needed == 'true' || github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch playlist statistics and history
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ vars.YOUTUBE_PLAYLIST_ID }}
          OUTPUT_JSON: data/statistics.json
          HISTORY_DIR: data/history/youtube
        run: python gh_scripts/fetch_playlist_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/statistics.json data/history/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update playlist statistics [skip ci]"
            git pull --rebase origin main
            git push
          fi