name: Update YouTube Playlist Stats

on:
  schedule:
    # Runs daily at 06:00 UTC. Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Fetch playlist statistics
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ vars.YOUTUBE_PLAYLIST_ID }}
          OUTPUT_PATH: data/youtube_stats.csv
        run: python gh_scripts/fetch_playlist_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube_stats.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update playlist statistics [skip ci]"
            git push
          fi