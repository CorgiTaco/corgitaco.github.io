name: Update Modrinth Download Stats

on:
  schedule:
    # Runs daily at 06:00 UTC. Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure data folder exists
        run: mkdir -p data/modrinth

      - name: Fetch Modrinth download stats
        env:
          MODRINTH_PROJECTS: ${{ vars.MODRINTH_PROJECTS }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OUTPUT_DIR: data/modrinth
        run: python gh_scripts/fetch_modrinth_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/modrinth
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Modrinth download statistics [skip ci]"
            git push
          fi