name: Send Daily Blog Newsletter

# Sends ONE digest of the posts added in the last 24h, at 3:00 PM Eastern daily,
# only if there are new posts. GitHub cron is UTC and not DST-aware, so we fire
# at both 19:00 and 20:00 UTC; notify_new_posts.py only proceeds when it is
# 15:00 in America/New_York, so it runs exactly once at 3pm ET year-round.
on:
  schedule:
    - cron: '0 19 * * *'   # 15:00 America/New_York during EDT (summer)
    - cron: '0 20 * * *'   # 15:00 America/New_York during EST (winter)
  workflow_dispatch:        # manual run (sends the last-24h digest immediately)

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for the 24-hour "added" lookback

      - name: Send digest of new posts
        env:
          BLOG_WEBHOOK_URL:    ${{ secrets.BLOG_WEBHOOK_URL }}
          BLOG_WEBHOOK_SECRET: ${{ secrets.BLOG_WEBHOOK_SECRET }}
          EVENT_NAME:          ${{ github.event_name }}
          LOOKBACK_HOURS:      '24'
        run: python3 .github/scripts/notify_new_posts.py