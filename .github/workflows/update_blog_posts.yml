name: Update Blog Posts Index

on:
  push:
    paths:
      - 'assets/blog/**.md'
  workflow_dispatch:

jobs:
  update-posts-txt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # CRITICAL: Fetches full history so `git log` works

      - name: Generate posts.txt from blog directory
        run: |
          BLOG_DIR="assets/blog"
          OUTPUT="$BLOG_DIR/internal/posts.txt"

          echo "# Auto-generated by GitHub Actions — do not edit manually." > "$OUTPUT"
          echo "# Lists blog post .md files, newest first (by last commit date)." >> "$OUTPUT"
          echo "" >> "$OUTPUT"

          git log --diff-filter=A --name-only --pretty=format:"%ct" -- "$BLOG_DIR/*.md" 2>/dev/null | \
          awk '
            /^[0-9]+$/ { ts = $0; next }
            /\.md$/ {
              file = $0
              n = split(file, parts, "/")
              name = parts[n]
              # assets/blog/post.md splits into 3 parts. 
              if (n == 3 && !seen[name]++) print ts "\t" name
            }
          ' | sort -rn | awk -F'\t' '{print $2}' >> "$OUTPUT" || true

          # Fallback: if git log produced nothing
          if [ "$(grep -c '\.md' "$OUTPUT" || echo 0)" -eq 0 ]; then
            echo "# (Sorted by checkout time — no git history available)" >> "$OUTPUT"
            ls -1t "$BLOG_DIR"/*.md 2>/dev/null | xargs -I{} basename {} >> "$OUTPUT" || true
          fi

          echo "Generated posts.txt:"
          cat "$OUTPUT"

      - name: Commit and push posts.txt if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet assets/blog/internal/posts.txt; then
            echo "posts.txt unchanged — nothing to commit."
          else
            git add assets/blog/internal/posts.txt
            git commit -m "chore: update blog posts.txt [skip ci]"
            git push
          fi
